  <text x="430" y="245" fill="#1F2A44" font-family="Arial, sans-serif" font-size="26" font-weight="700">Loo kalender</text>
  <text x="410" y="282" fill="#61708C" font-family="Arial, sans-serif" font-size="18">Sisesta nimi või tee
